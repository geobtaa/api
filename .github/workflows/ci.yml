name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      paradedb:
        image: paradedb/paradedb:0.18.11
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: btaa_geospatial_api
        ports:
          - 2345:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d btaa_geospatial_api"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms1g -Xmx1g
        ports:
          - 9200:9200
        options: >-
          --ulimit nofile=65536:65536
          --health-cmd "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=60s || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 18
      redis:
        image: redis:7.4.6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping | grep PONG"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      APP_ENV: test
      POSTGRES_PASSWORD: postgres
      DB_PASSWORD: postgres
      DB_USER: postgres
      DB_HOST: localhost
      DB_PORT: "2345"
      TEST_DB_NAME: btaa_geospatial_api_test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:2345/btaa_geospatial_api_test
      APPLICATION_URL: http://localhost:8000
      ELASTICSEARCH_URL: http://localhost:9200
      ELASTICSEARCH_INDEX: btaa_geospatial_api_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_DB: "1"
      ENDPOINT_CACHE: "false"
      TURNSTILE_ENABLED: "false"
      DISABLE_API_USAGE_LOG: "true"
      DISABLE_RATE_LIMIT_FOR_TESTS: "true"
      WALLCLOCK_TIMEOUT_SECONDS: "900"
      TIMEOUT_GRACE_SECONDS: "30"

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            g++ \
            python3-dev \
            libjpeg-dev \
            zlib1g-dev \
            libpng-dev \
            libcairo2-dev \
            pkg-config \
            gdal-bin \
            libgdal-dev \
            curl \
            ca-certificates

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/uv.lock

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[dev]"

      - name: Prepare backend test database
        working-directory: backend
        run: |
          python - <<'PY'
          import os

          import psycopg2
          from psycopg2 import sql
          from psycopg2.extensions import ISOLATION_LEVEL_AUTOCOMMIT

          db_name = os.environ.get("TEST_DB_NAME", "btaa_geospatial_api_test")
          conn = psycopg2.connect(
              dbname="postgres",
              user=os.environ.get("DB_USER", "postgres"),
              password=os.environ.get("DB_PASSWORD")
              or os.environ.get("POSTGRES_PASSWORD", "postgres"),
              host=os.environ.get("DB_HOST", "localhost"),
              port=os.environ.get("DB_PORT", "2345"),
          )
          conn.set_isolation_level(ISOLATION_LEVEL_AUTOCOMMIT)
          try:
              with conn.cursor() as cur:
                  cur.execute("SELECT 1 FROM pg_database WHERE datname = %s", (db_name,))
                  if cur.fetchone() is None:
                      cur.execute(
                          sql.SQL("CREATE DATABASE {}").format(sql.Identifier(db_name))
                      )
          finally:
              conn.close()
          PY

      - name: Lint backend
        run: make lint-check

      - name: Run backend tests
        working-directory: backend
        run: |
          python scripts/run_with_timeout.py \
            python -X faulthandler -m pytest \
            -n 2 \
            -m "not network" \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      VITE_USE_JSONP: "false"
      VITE_ENFORCE_HTTPS: "false"
      VITE_TURNSTILE_ENABLED: "false"
      VITE_TURNSTILE_ENABLE_LOCAL: "false"
      API_BASE_URL: http://localhost:8000/api/v1

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Build frontend
        run: npm run build

  cli:
    name: CLI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: cli/pyproject.toml

      - name: Install CLI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint CLI
        run: make lint

      - name: Test CLI
        run: make test

      - name: Build CLI package
        run: make build

  qgis-plugin:
    name: QGIS Plugin
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: qgis-plugin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: qgis-plugin/pyproject.toml

      - name: Install QGIS plugin dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint QGIS plugin
        run: make lint-check

      - name: Test QGIS plugin
        run: make test-no-coverage

  docs:
    name: MkDocs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mkdocs/requirements-docs.txt

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r mkdocs/requirements-docs.txt

      - name: Build documentation
        working-directory: mkdocs
        run: mkdocs build --config-file mkdocs.yml --site-dir site
