name: Deploy MkDocs to GitHub Pages
on:
  push:
    branches: [develop]
    paths:
      - "mkdocs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ hashFiles('mkdocs/requirements-docs.txt') }}
          path: ~/.cache
          restore-keys: mkdocs-material-

      - run: pip install -r mkdocs/requirements-docs.txt

      - run: mkdocs build --config-file mkdocs/mkdocs.yml --site-dir mkdocs/site

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: mkdocs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
