<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resource Class Icon Preview</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #173a53;
        --paper: #ffffff;
        --page: #f5f7f8;
        --muted: #5f7281;
        --border: #d9e2e7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--page);
        color: #12212b;
      }

      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1 {
        margin: 0 0 8px;
        color: var(--ink);
        font-size: 28px;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 15px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 22px;
      }

      .card {
        background: var(--paper);
        border: 1px solid var(--border);
        padding: 18px 18px 16px;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
      }

      .thumb {
        width: 200px;
        height: 200px;
        display: block;
        margin: 0 auto;
      }

      .label {
        margin-top: 10px;
        font-size: 14px;
        font-weight: 700;
        color: var(--ink);
        text-align: center;
      }

      code {
        background: #eaf1f5;
        padding: 2px 6px;
      }
    </style>
  </head>
