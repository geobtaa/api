server {
    listen 8080;
    server_name localhost;

    # Response compression (negotiated via Accept-Encoding).
    # Safe defaults for JSON/text; tune as needed.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        application/json
        application/geo+json
        application/vnd.api+json
        application/javascript
        text/css
        text/plain
        text/javascript
        text/xml
        application/xml
        application/rss+xml
        image/svg+xml;

    # Brotli (br) is faster/smaller than gzip, but requires an Nginx build with the brotli module.
    # If your Nginx supports it, you can enable it here (and keep gzip as a fallback):
    # brotli on;
    # brotli_comp_level 5;
    # brotli_min_length 1000;
    # brotli_types application/json application/geo+json application/vnd.api+json text/plain text/css application/javascript image/svg+xml;

    # Increase body size limit for large requests
    client_max_body_size 100M;

    # Proxy to API container
    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # CORS headers are handled by the API, so we just pass through
        # Timeouts for long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }
}

