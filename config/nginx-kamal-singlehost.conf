server {
    listen 8000;
    server_name _;

    # Allow large requests (e.g., some POST searches / uploads)
    client_max_body_size 100M;

    # Preserve upstream/client information
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Route static files to FastAPI (for API docs branding)
    location ^~ /static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # Route API paths to FastAPI (uvicorn) running on loopback
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # Everything else goes to the SSR server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }
}

