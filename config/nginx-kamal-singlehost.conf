server {
    listen 8000;
    server_name _;

    # Allow large requests (e.g., some POST searches / uploads)
    client_max_body_size 100M;

    # Preserve upstream/client information
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Route static files to FastAPI (for API docs branding)
    location ^~ /static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # MCP WebSocket transport requires an explicit HTTP/1.1 upgrade hop.
    # Without this, nginx forwards a plain GET to FastAPI and the websocket
    # route appears as a 404 from the app.
    location = /api/v1/mcp/ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;
    }

    # Route API paths to FastAPI (uvicorn) running on loopback
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # Route crawler-facing artifacts to FastAPI so they can be generated from
    # shared Redis-backed state instead of container-local files.
    location = /robots.txt {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    location ^~ /sitemaps/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # Everything else goes to the SSR server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }
}
