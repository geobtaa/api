server {
    listen 8000;
    server_name _;
    root /app/frontend/build/client;

    sendfile on;
    tcp_nopush on;
    etag on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/manifest+json
        image/svg+xml;

    # Allow large requests (e.g., some POST searches / uploads)
    client_max_body_size 100M;

    # Preserve upstream/client information
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Serve immutable Vite/React Router build assets directly from disk so JS/CSS
    # requests do not need to pass through the SSR Node process.
    location ^~ /assets/ {
        access_log off;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Institution/provider icons are static build artifacts too, but they are not
    # content-addressed, so keep a shorter TTL than the hashed asset directory.
    location ^~ /icons/ {
        access_log off;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
    }

    location = /manifest.webmanifest {
        access_log off;
        try_files $uri @ssr;
        default_type application/manifest+json;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400" always;
    }

    # Serve other build-time frontend static files directly when present:
    # manifests, service-worker entrypoints, root images, and similar assets.
    location ~* ^/.+\.(?:css|js|png|jpg|jpeg|gif|svg|ico|webmanifest|txt|html|woff|woff2)$ {
        access_log off;
        try_files $uri @ssr;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400" always;
    }

    # Route static files to FastAPI (for API docs branding)
    location ^~ /static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # MCP WebSocket transport requires an explicit HTTP/1.1 upgrade hop.
    # Without this, nginx forwards a plain GET to FastAPI and the websocket
    # route appears as a 404 from the app.
    location = /api/v1/mcp/ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;
    }

    # Route API paths to FastAPI (uvicorn) running on loopback
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # Route crawler-facing artifacts to FastAPI so they can be generated from
    # shared Redis-backed state instead of container-local files.
    location = /robots.txt {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    location ^~ /sitemaps/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # Everything else goes to the SSR server.
    location @ssr {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }
}
