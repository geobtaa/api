# Destination: dev1 — Original dev server
# Merged with config/deploy.yml when using: kamal deploy -d dev1

servers:
  web:
    hosts:
      - lib-btaageoapi-dev-app-01.oit.umn.edu
    cmd: bash -lc "/app/scripts/start_web_singlehost.sh"
    options:
      cpus: 5
      memory: 3584m

  worker:
    hosts:
      - lib-btaageoapi-dev-app-01.oit.umn.edu
    cmd: celery -A app.tasks.worker worker --loglevel=INFO
    options:
      cpus: 0.75
      memory: 1536m

  cron:
    hosts:
      - lib-btaageoapi-dev-app-01.oit.umn.edu
    cmd: bash -lc '/app/scripts/start_cron.sh'
    options:
      user: root

  flower:
    hosts:
      - lib-btaageoapi-dev-app-01.oit.umn.edu
    cmd: celery -A app.tasks.worker flower --port=5555

proxy:
  host: lib-btaageoapi-dev-app-01.oit.umn.edu

builder:
  args:
    VITE_API_BASE_URL: "https://lib-btaageoapi-dev-app-01.oit.umn.edu/api/v1"
    VITE_TURNSTILE_ACTION: "geoportal_gate"
    VITE_TURNSTILE_ENABLED: "true"
    VITE_TURNSTILE_PUBLIC_SITE: "0x4AAAAAADJqCBiv8czDm2ZG"
    VITE_KAMAL_DEST: "dev1"

env:
  clear:
    APPLICATION_URL: https://lib-btaageoapi-dev-app-01.oit.umn.edu
    APP_ENV: development
    APP_REVISION: "<%= ENV.fetch('APP_REVISION') { ENV.fetch('KAMAL_VERSION') { `git rev-parse --verify HEAD`.strip } } %>"
    KAMAL_DEST: dev1
    APPSIGNAL_ACTIVE: "false"
    APPSIGNAL_APP_ENV: development
    APPSIGNAL_APP_NAME: "BTAA Geospatial API - Development"
    APPSIGNAL_BACKEND_ACTIVE: "false"
    APPSIGNAL_BACKEND_APP_ENV: development
    APPSIGNAL_BACKEND_APP_NAME: "BTAA Geospatial API - Development"
    APPSIGNAL_BACKEND_APP_ID: "6a316c2135fc588db66c7661"
    APPSIGNAL_BACKEND_ENABLE_HOST_METRICS: "false"
    APPSIGNAL_BACKEND_HOST_ROLE: backend
    APPSIGNAL_BACKEND_WORKING_DIRECTORY_PATH: /tmp/appsignal-backend
    APPSIGNAL_BACKEND_OPENTELEMETRY_PORT: "8099"
    APPSIGNAL_FRONTEND_ACTIVE: "false"
    APPSIGNAL_FRONTEND_APP_ENV: development
    APPSIGNAL_FRONTEND_APP_NAME: "BTAA Geoportal SSR - Development"
    APPSIGNAL_FRONTEND_APP_ID: "6a316c1a35fc588db66c7657"
    APPSIGNAL_FRONTEND_ENABLE_HOST_METRICS: "false"
    APPSIGNAL_FRONTEND_HOST_ROLE: frontend
    APPSIGNAL_FRONTEND_WORKING_DIRECTORY_PATH: /tmp/appsignal-frontend
    APPSIGNAL_FRONTEND_OPENTELEMETRY_PORT: "8100"
    TURNSTILE_ENABLED: "true"
    TURNSTILE_ALLOWED_HOSTNAMES: lib-btaageoapi-dev-app-01.oit.umn.edu
    TURNSTILE_COOKIE_SECURE: "true"
    TURNSTILE_EXPECTED_ACTION: geoportal_gate
    FEEDBACK_EMAIL_ENABLED: "true"
    FEEDBACK_DELIVERY: "<%= ENV.fetch('FEEDBACK_DELIVERY', 'smtp') %>"
    SENDMAIL_PATH: "<%= ENV.fetch('SENDMAIL_PATH', '/usr/sbin/sendmail') %>"
    SENDMAIL_ARGS: "<%= ENV.fetch('SENDMAIL_ARGS', '-t -i') %>"
    SMTP_HOST: "<%= ENV.fetch('SMTP_HOST', '172.18.0.1') %>"
    SMTP_PORT: "<%= ENV.fetch('SMTP_PORT', '25') %>"
    SMTP_STARTTLS: "<%= ENV.fetch('SMTP_STARTTLS', 'false') %>"
    WEB_UVICORN_WORKERS: "3"
    WEB_INTERNAL_UVICORN_WORKERS: "4"
    WEB_SSR_WORKERS: "3"

accessories:
  elasticsearch:
    env:
      clear:
        ES_JAVA_OPTS: "-Xms4g -Xmx4g"
