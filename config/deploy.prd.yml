<%
# Makefile includes keep shell-style wrapper quotes as literal characters.
# Normalize them so Kamal config rendering matches `source .kamal/secrets.*`.
ENV.each do |key, value|
  next unless value.is_a?(String) && value.length >= 2

  if (value.start_with?('"') && value.end_with?('"')) ||
     (value.start_with?("'") && value.end_with?("'"))
    ENV[key] = value[1...-1]
  end
end
%>

# Destination: prd — Production server
# Merged with config/deploy.yml when using: kamal deploy -d prd

servers:
  web:
    hosts:
      - lib-geoportal-prd-web-01.oit.umn.edu
    cmd: bash -lc "/app/scripts/start_web_singlehost.sh"
    options:
      cpus: 8
      memory: 5120m

  worker:
    hosts:
      - lib-geoportal-prd-web-01.oit.umn.edu
    cmd: bash -c "cd /app/backend && exec /opt/venv/bin/celery -A app.tasks.worker worker --loglevel=INFO"
    options:
      cpus: 1.75
      memory: 2048m

  cron:
    hosts:
      - lib-geoportal-prd-web-01.oit.umn.edu
    cmd: bash -lc '/app/scripts/start_cron.sh'
    options:
      user: root

proxy:
  host: geo.btaa.org,lib-geoportal-prd-web-01.oit.umn.edu

volumes:
  - /var/lib/btaa-geospatial-api/backups:/var/backups/btaa-geospatial-api

builder:
  args:
    VITE_API_BASE_URL: "https://geo.btaa.org/api/v1"
    VITE_TURNSTILE_ACTION: "geoportal_gate"
    VITE_TURNSTILE_ENABLED: "true"
    VITE_TURNSTILE_PUBLIC_SITE: "0x4AAAAAADJqCBiv8czDm2ZG"
    VITE_GTM_ID: "GTM-K7S6976T"
    VITE_KAMAL_DEST: "prd"

env:
  clear:
    APPLICATION_URL: https://geo.btaa.org
    GEOPORTAL_BASE_URL: https://geo.btaa.org
    APP_ENV: production
    LOG_LEVEL: INFO
    APP_REVISION: "<%= ENV.fetch('APP_REVISION') { ENV.fetch('KAMAL_VERSION') { `git rev-parse --verify HEAD`.strip } } %>"
    KAMAL_DEST: prd
    APPSIGNAL_ACTIVE: "true"
    APPSIGNAL_APP_ENV: production
    APPSIGNAL_APP_NAME: "BTAA Geospatial API - Production"
    APPSIGNAL_BACKEND_ACTIVE: "true"
    APPSIGNAL_BACKEND_APP_ENV: production
    APPSIGNAL_BACKEND_APP_NAME: "BTAA Geospatial API - Production"
    APPSIGNAL_BACKEND_APP_ID: "6a31948735fc588db66c770e"
    APPSIGNAL_BACKEND_ENABLE_HOST_METRICS: "true"
    APPSIGNAL_BACKEND_HOST_ROLE: backend
    APPSIGNAL_BACKEND_WORKING_DIRECTORY_PATH: /tmp/appsignal-backend
    APPSIGNAL_BACKEND_OPENTELEMETRY_PORT: "8099"
    APPSIGNAL_FRONTEND_ACTIVE: "true"
    APPSIGNAL_FRONTEND_APP_ENV: production
    APPSIGNAL_FRONTEND_APP_NAME: "BTAA Geoportal SSR - Production"
    APPSIGNAL_FRONTEND_APP_ID: "6a31948035fc588db66c7704"
    APPSIGNAL_FRONTEND_ENABLE_HOST_METRICS: "false"
    APPSIGNAL_FRONTEND_HOST_ROLE: frontend
    APPSIGNAL_FRONTEND_WORKING_DIRECTORY_PATH: /tmp/appsignal-frontend
    APPSIGNAL_FRONTEND_OPENTELEMETRY_PORT: "8100"
    BRIDGE_SYNC_REPORT_ENABLED: "true"
    BRIDGE_SYNC_REPORT_DELIVERY: sendmail
    FEEDBACK_EMAIL_ENABLED: "true"
    FEEDBACK_DELIVERY: "<%= ENV.fetch('FEEDBACK_DELIVERY', 'sendmail') %>"
    SENDMAIL_PATH: "<%= ENV.fetch('SENDMAIL_PATH', '/usr/sbin/sendmail') %>"
    SENDMAIL_ARGS: "<%= ENV.fetch('SENDMAIL_ARGS', '-t -i') %>"
    SMTP_HOST: "<%= ENV.fetch('SMTP_HOST', '172.18.0.1') %>"
    SMTP_PORT: "<%= ENV.fetch('SMTP_PORT', '25') %>"
    SMTP_STARTTLS: "<%= ENV.fetch('SMTP_STARTTLS', 'false') %>"
    SEARCH_ENGINE_INDEXING_ENABLED: "true"
    RATE_LIMIT_ENABLED: "true"
    TURNSTILE_ENABLED: "true"
    TURNSTILE_ALLOWED_HOSTNAMES: geo.btaa.org,lib-geoportal-prd-web-01.oit.umn.edu
    TURNSTILE_COOKIE_SECURE: "true"
    TURNSTILE_EXPECTED_ACTION: geoportal_gate
    CACHE_DEBUG_HEADERS: "false"
    CACHE_LOG_EVENTS: "false"
    API_KEY_TIER_CACHE_TTL_SECONDS: "60"
    API_KEY_LAST_USED_UPDATE_INTERVAL_SECONDS: "60"
    API_KEY_TIER_CACHE_MAX_ENTRIES: "2048"
    DB_POOL_MIN: "1"
    DB_POOL_MAX: "2"
    SQLALCHEMY_ASYNC_USE_NULLPOOL: "false"
    SQLALCHEMY_ASYNC_POOL_SIZE: "1"
    SQLALCHEMY_ASYNC_MAX_OVERFLOW: "0"
    SQLALCHEMY_ASYNC_POOL_TIMEOUT: "5"
    SQLALCHEMY_SYNC_USE_NULLPOOL: "false"
    SQLALCHEMY_SYNC_POOL_SIZE: "1"
    SQLALCHEMY_SYNC_MAX_OVERFLOW: "0"
    SQLALCHEMY_SYNC_POOL_TIMEOUT: "5"
    WEB_UVICORN_WORKERS: "4"
    WEB_INTERNAL_UVICORN_WORKERS: "6"
    WEB_SSR_WORKERS: "4"
    BACKUP_ENABLED: "<%= ENV.fetch('BACKUP_ENABLED', 'true') %>"
    BACKUP_REQUIRED_DEST: prd
    BACKUP_POSTGRES_TARGET: "<%= ENV.fetch('BACKUP_POSTGRES_TARGET', 'local') %>"
    BACKUP_LOCAL_DIR: "<%= ENV.fetch('BACKUP_LOCAL_DIR', '/var/backups/btaa-geospatial-api') %>"
    BACKUP_RETENTION_COUNT: "<%= ENV.fetch('BACKUP_RETENTION_COUNT', '3') %>"
    BACKUP_S3_BUCKET: "<%= ENV.fetch('BACKUP_S3_BUCKET', '') %>"
    BACKUP_S3_PREFIX: "<%= ENV.fetch('BACKUP_S3_PREFIX', 'btaa-geospatial-api') %>"
    BACKUP_S3_REGION: "<%= ENV.fetch('BACKUP_S3_REGION', ENV.fetch('AWS_REGION', 'us-east-2')) %>"
    AWS_REGION: "<%= ENV.fetch('AWS_REGION', ENV.fetch('BACKUP_S3_REGION', 'us-east-2')) %>"
    AWS_DEFAULT_REGION: "<%= ENV.fetch('AWS_DEFAULT_REGION', ENV.fetch('AWS_REGION', ENV.fetch('BACKUP_S3_REGION', 'us-east-2'))) %>"
    ELASTICSEARCH_SNAPSHOT_REPOSITORY: btaa_geoportal_snapshots
    ELASTICSEARCH_SNAPSHOT_REPOSITORY_TYPE: s3
    ELASTICSEARCH_SNAPSHOT_S3_BASE_PATH: "<%= ENV.fetch('ELASTICSEARCH_SNAPSHOT_S3_BASE_PATH', 'btaa-geospatial-api/prd/elasticsearch') %>"
    ELASTICSEARCH_SNAPSHOT_S3_STORAGE_CLASS: "<%= ENV.fetch('ELASTICSEARCH_SNAPSHOT_S3_STORAGE_CLASS', '') %>"
    ELASTICSEARCH_SNAPSHOT_S3_SERVER_SIDE_ENCRYPTION: "<%= ENV.fetch('ELASTICSEARCH_SNAPSHOT_S3_SERVER_SIDE_ENCRYPTION', 'true') %>"
  secret:
    # Destination secret lists replace the base list rather than appending.
    # Keep the shared entries in sync with config/deploy.yml; prod-only backup
    # secrets are listed at the end.
    - REDIS_PASSWORD
    - POSTGRES_PASSWORD
    - DATABASE_URL
    - KITHE_BRIDGE_TOKEN
    - OPENAI_API_KEY
    - OPENAI_MODEL
    - ADMIN_USERNAME
    - ADMIN_PASSWORD
    - BTAA_GEOSPATIAL_API_KEY
    - TURNSTILE_SECRET_KEY
    - APPSIGNAL_PUSH_API_KEY
<% if ENV.fetch('SMTP_USERNAME', '').strip != '' %>
    - SMTP_USERNAME
<% end %>
<% if ENV.fetch('SMTP_PASSWORD', '').strip != '' %>
    - SMTP_PASSWORD
<% end %>
    - SLACK_SIGNING_SECRET
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY

accessories:
  elasticsearch:
    env:
      clear:
        ES_JAVA_OPTS: "-Xms4g -Xmx4g"
      secret:
        - AWS_ACCESS_KEY_ID
        - AWS_SECRET_ACCESS_KEY
