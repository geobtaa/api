# Destination: prd — Production server
# Merged with config/deploy.yml when using: kamal deploy -d prd

servers:
  web:
    hosts:
      - lib-geoportal-prd-web-01.oit.umn.edu
    cmd: bash -lc "/app/scripts/start_web_singlehost.sh"
    options:
      cpus: 8
      memory: 5120m

  worker:
    hosts:
      - lib-geoportal-prd-web-01.oit.umn.edu
    cmd: celery -A app.tasks.worker worker --loglevel=INFO
    options:
      cpus: 1.75
      memory: 2048m

  cron:
    hosts:
      - lib-geoportal-prd-web-01.oit.umn.edu
    cmd: bash -lc '/opt/venv/bin/python3 /app/scripts/render_cron_env.py /tmp/cron-container-env.sh && (printf "ADMIN_USERNAME=%s\nADMIN_PASSWORD=%s\nAPPLICATION_URL=%s\nBRIDGE_TRIGGER=%s\n" "${ADMIN_USERNAME}" "${ADMIN_PASSWORD}" "${APPLICATION_URL}" "${BRIDGE_TRIGGER:-nightly_cron}"; cat config/crontab) | crontab - && cron -f'
    options:
      user: root

  flower:
    hosts:
      - lib-geoportal-prd-web-01.oit.umn.edu
    cmd: celery -A app.tasks.worker flower --port=5555

proxy:
  host: lib-geoportal-prd-web-01.oit.umn.edu

builder:
  args:
    VITE_API_BASE_URL: "https://lib-geoportal-prd-web-01.oit.umn.edu/api/v1"
    VITE_TURNSTILE_ACTION: "geoportal_gate"
    VITE_TURNSTILE_ENABLED: "true"
    VITE_TURNSTILE_SITE_KEY: "0x4AAAAAADJqCBiv8czDm2ZG"
    VITE_GTM_ID: "GTM-K7S6976T"
    VITE_KAMAL_DEST: "prd"

env:
  clear:
    APPLICATION_URL: https://lib-geoportal-prd-web-01.oit.umn.edu
    APP_ENV: production
    KAMAL_DEST: prd
    BRIDGE_SYNC_REPORT_ENABLED: "true"
    BRIDGE_SYNC_REPORT_DELIVERY: sendmail
    SENDMAIL_PATH: /usr/sbin/sendmail
    SENDMAIL_ARGS: "-t -i"
    SEARCH_ENGINE_INDEXING_ENABLED: "false"
    RATE_LIMIT_ENABLED: "true"
    TURNSTILE_ENABLED: "true"
    TURNSTILE_ALLOWED_HOSTNAMES: lib-geoportal-prd-web-01.oit.umn.edu
    TURNSTILE_COOKIE_SECURE: "true"
    TURNSTILE_EXPECTED_ACTION: geoportal_gate
    CACHE_DEBUG_HEADERS: "false"
    CACHE_LOG_EVENTS: "false"
    API_KEY_TIER_CACHE_TTL_SECONDS: "60"
    API_KEY_LAST_USED_UPDATE_INTERVAL_SECONDS: "60"
    API_KEY_TIER_CACHE_MAX_ENTRIES: "2048"
    DB_POOL_MIN: "1"
    DB_POOL_MAX: "2"
    SQLALCHEMY_ASYNC_USE_NULLPOOL: "false"
    SQLALCHEMY_ASYNC_POOL_SIZE: "1"
    SQLALCHEMY_ASYNC_MAX_OVERFLOW: "0"
    SQLALCHEMY_ASYNC_POOL_TIMEOUT: "5"
    SQLALCHEMY_SYNC_USE_NULLPOOL: "false"
    SQLALCHEMY_SYNC_POOL_SIZE: "1"
    SQLALCHEMY_SYNC_MAX_OVERFLOW: "0"
    SQLALCHEMY_SYNC_POOL_TIMEOUT: "5"
    WEB_UVICORN_WORKERS: "4"
    WEB_INTERNAL_UVICORN_WORKERS: "6"
    WEB_SSR_WORKERS: "4"
  secret:
    - SLACK_SIGNING_SECRET

accessories:
  elasticsearch:
    env:
      clear:
        ES_JAVA_OPTS: "-Xms4g -Xmx4g"
