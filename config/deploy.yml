<%
# Makefile includes keep shell-style wrapper quotes as literal characters.
# Normalize them so Kamal config rendering matches `source .kamal/secrets.*`.
ENV.each do |key, value|
  next unless value.is_a?(String) && value.length >= 2

  if (value.start_with?('"') && value.end_with?('"')) ||
     (value.start_with?("'") && value.end_with?("'"))
    ENV[key] = value[1...-1]
  end
end
%>

# Name of your application. Used to uniquely configure containers.
service: btaa-geospatial-api

# Name of the container image (WITHOUT registry host; Kamal adds registry.server).
image: ewlarson/btaa-geospatial-api

# Require -d <destination> so we never deploy without specifying dev1/dev2/etc.
require_destination: true

builder:
  arch: amd64
  dockerfile: Dockerfile.kamal
  args:
    # Browser bundle should call the API on the same host (single-host routing)
    VITE_API_BASE_URL: "https://<%= ENV['KAMAL_HOST'] %>/api/v1"
    VITE_USE_JSONP: "false"
    VITE_ENFORCE_HTTPS: "true"
    VITE_TURNSTILE_ACTION: "<%= ENV.fetch('VITE_TURNSTILE_ACTION', 'geoportal_gate') %>"
    VITE_TURNSTILE_ENABLED: "<%= ENV.fetch('VITE_TURNSTILE_ENABLED', 'false') %>"
    VITE_TURNSTILE_PUBLIC_SITE: "<%= ENV.fetch('VITE_TURNSTILE_SITE_KEY', '') %>"
    VITE_GTM_ID: ""
    VITE_KAMAL_DEST: ""

# Bridge hashed frontend assets across deploys so open pages can continue
# loading the old chunk set while the new release comes up.
asset_path: /app/frontend/build/client/assets

ssh:
  user: <%= ENV['KAMAL_SSH_USER'] %>

# Deploy to these servers.
servers:
  web:
    hosts:
      - <%= ENV['KAMAL_HOST'] %>
    cmd: bash -lc "/app/scripts/start_web_singlehost.sh"
    options:
      cpus: <%= ENV.fetch('KAMAL_WEB_CPUS', '2') %>
      memory: <%= ENV.fetch('KAMAL_WEB_MEMORY', '1536m') %>

  worker:
    hosts:
      - <%= ENV['KAMAL_HOST'] %>
    cmd: bash -lc 'cd /app/backend && exec /opt/venv/bin/celery -A app.tasks.worker worker --loglevel=INFO --concurrency="${CELERY_WORKER_CONCURRENCY:-2}" --prefetch-multiplier=1 --max-tasks-per-child="${CELERY_MAX_TASKS_PER_CHILD:-5000}" --max-memory-per-child="${CELERY_MAX_MEMORY_PER_CHILD_KB:-900000}"'
    options:
      cpus: <%= ENV.fetch('KAMAL_WORKER_CPUS', '1') %>
      memory: <%= ENV.fetch('KAMAL_WORKER_MEMORY', '1024m') %>

  cron:
    hosts:
      - <%= ENV['KAMAL_HOST'] %>
    # Load `config/crontab` and inject required env vars so cron jobs can
    # use secret-backed values like DATABASE_URL and ADMIN_PASSWORD.
    #
    # Kamal runs each "server" as its own container; `cron -f` keeps it alive.
    cmd: bash -lc '/app/scripts/start_cron.sh'
    options:
      cpus: <%= ENV.fetch('KAMAL_CRON_CPUS', '0.25') %>
      memory: <%= ENV.fetch('KAMAL_CRON_MEMORY', '256m') %>
      user: root

proxy:
  ssl: true
  host: <%= ENV['KAMAL_HOST'] %>
  app_port: 8000
  healthcheck:
    path: /api/docs

# Credentials for your image host.
registry:
  server: ghcr.io
  username: <%= ENV['KAMAL_REGISTRY_USERNAME'] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

# ───────────────── ENV passed into *every* container ────────────────
env:
  clear:
    ELASTICSEARCH_URL:     http://btaa-geospatial-api-elasticsearch:9200
    REDIS_HOST:            btaa-geospatial-api-redis
    REDIS_PORT:            "6379"
    REDIS_DB:              "0"
    RATE_LIMIT_REDIS_DB:   "2"
    ELASTICSEARCH_INDEX:   btaa_geospatial_api
    REDIS_TTL:             "604800"
    LOG_LEVEL:             DEBUG
    ENDPOINT_CACHE:        "true"
    CACHE_DEBUG_HEADERS:   "true"
    CACHE_LOG_EVENTS:      "false"
    CACHE_VERSION:         "2026-01-14-C"
    # Optional: bump this to force a new cache namespace without flushing Redis
    CACHE_APP_VERSION:     ""
    API_RESPONSE_DURABLE_CACHE_STORE: database
    VISUAL_ASSET_CACHE_TTL_SECONDS: "604800"
    REDIS_TIMEOUT_SECONDS: "0.5"
    CACHE_LOCK_WAIT_SECONDS: "0.25"
    STALE_IF_ERROR_SECONDS: "300"
    MAX_STALE_EXTENSION_SECONDS: "3600"
    GAZETTEER_CACHE_TTL:   "3600"
    APP_MODE:              production
    APPLICATION_URL:       https://<%= ENV['KAMAL_HOST'] %>
    SEARCH_ENGINE_INDEXING_ENABLED: "<%= ENV.fetch('SEARCH_ENGINE_INDEXING_ENABLED', 'false') %>"
    KITHE_BRIDGE_URL:      https://geomg.lib.umn.edu/api/kithe_bridge
    KITHE_BRIDGE_VERIFY_SSL: "<%= ENV.fetch('KITHE_BRIDGE_VERIFY_SSL', 'true') %>"
    PYTHONUNBUFFERED:      "1"
    PYTHONPATH:            /app
    # IMPORTANT: tells db/config.py not to rewrite Docker hostnames to localhost:2345
    IS_DOCKER:             "true"
    CORS_ORIGINS:          "*"
    STATIC_MAPS_DIR:       /app/static/maps
    RATE_LIMIT_ENABLED:    "false"
    TURNSTILE_ENABLED:     "<%= ENV.fetch('TURNSTILE_ENABLED', 'false') %>"
    TURNSTILE_EXPECTED_ACTION: "<%= ENV.fetch('TURNSTILE_EXPECTED_ACTION', 'geoportal_gate') %>"
    TURNSTILE_ALLOWED_HOSTNAMES: "<%= ENV.fetch('TURNSTILE_ALLOWED_HOSTNAMES', ENV['KAMAL_HOST']) %>"
    TURNSTILE_PROTECTED_PATHS: "<%= ENV.fetch('TURNSTILE_PROTECTED_PATHS', '/api/v1/search,/api/v1/suggest,/api/v1/map/h3') %>"
    TURNSTILE_COOKIE_SECURE: "<%= ENV.fetch('TURNSTILE_COOKIE_SECURE', 'true') %>"
    SLACK_BOT_COMMAND:     "<%= ENV.fetch('SLACK_BOT_COMMAND', '/btaa') %>"
    WEB_UVICORN_WORKERS:   "<%= ENV.fetch('WEB_UVICORN_WORKERS', '2') %>"
    CELERY_WORKER_CONCURRENCY: "<%= ENV.fetch('CELERY_WORKER_CONCURRENCY', '2') %>"
    CELERY_MAX_TASKS_PER_CHILD: "<%= ENV.fetch('CELERY_MAX_TASKS_PER_CHILD', '5000') %>"
    CELERY_MAX_MEMORY_PER_CHILD_KB: "<%= ENV.fetch('CELERY_MAX_MEMORY_PER_CHILD_KB', '900000') %>"
    # Loopback-only FastAPI pool used by SSR/BFF fetches. This keeps frontend
    # traffic from occupying the public /api worker queue used by QGIS, MCP,
    # and other external clients. Set to "0" to route SSR back to the public pool.
    WEB_INTERNAL_UVICORN_WORKERS: "<%= ENV.fetch('WEB_INTERNAL_UVICORN_WORKERS', '1') %>"
    WEB_SSR_WORKERS:      "<%= ENV.fetch('WEB_SSR_WORKERS', '1') %>"
    BRIDGE_SYNC_REPORT_ENABLED: "<%= ENV.fetch('BRIDGE_SYNC_REPORT_ENABLED', 'false') %>"
    BRIDGE_SYNC_REPORT_RECIPIENTS: "<%= ENV.fetch('BRIDGE_SYNC_REPORT_RECIPIENTS', 'ewlarson@gmail.com,majew030@umn.edu') %>"
    BRIDGE_SYNC_REPORT_FROM: "<%= ENV.fetch('BRIDGE_SYNC_REPORT_FROM', 'BTAA Geoportal <no-reply@geo.btaa.org>') %>"
    BRIDGE_SYNC_REPORT_DESTINATIONS: "<%= ENV.fetch('BRIDGE_SYNC_REPORT_DESTINATIONS', 'prd') %>"
    BRIDGE_SYNC_REPORT_DELIVERY: "<%= ENV.fetch('BRIDGE_SYNC_REPORT_DELIVERY', 'smtp') %>"
    FEEDBACK_EMAIL_ENABLED: "<%= ENV.fetch('FEEDBACK_EMAIL_ENABLED', 'false') %>"
    FEEDBACK_RECIPIENTS: "<%= ENV.fetch('FEEDBACK_RECIPIENTS', 'majew030@umn.edu,btaa-gdp@umn.edu,geoportal@btaa.org') %>"
    FEEDBACK_FROM: "<%= ENV.fetch('FEEDBACK_FROM', 'BTAA Geoportal <no-reply@geo.btaa.org>') %>"
    FEEDBACK_DELIVERY: "<%= ENV.fetch('FEEDBACK_DELIVERY', ENV.fetch('BRIDGE_SYNC_REPORT_DELIVERY', 'smtp')) %>"
    SENDMAIL_PATH:         "<%= ENV.fetch('SENDMAIL_PATH', '/usr/sbin/sendmail') %>"
    SENDMAIL_ARGS:         "<%= ENV.fetch('SENDMAIL_ARGS', '-t -i') %>"
    SMTP_HOST:             "<%= ENV.fetch('SMTP_HOST', '') %>"
    SMTP_PORT:             "<%= ENV.fetch('SMTP_PORT', '587') %>"
    SMTP_STARTTLS:         "<%= ENV.fetch('SMTP_STARTTLS', 'true') %>"
    SMTP_SSL:              "<%= ENV.fetch('SMTP_SSL', 'false') %>"
    SMTP_TIMEOUT_SECONDS:  "<%= ENV.fetch('SMTP_TIMEOUT_SECONDS', '20') %>"
    BACKUP_ENABLED:        "false"
    BACKUP_REQUIRED_DEST:  "prd"
    BACKUP_POSTGRES_TARGET: "s3"
    BACKUP_LOCAL_DIR:      "<%= ENV.fetch('BACKUP_LOCAL_DIR', '/var/backups/btaa-geospatial-api') %>"
    BACKUP_RETENTION_COUNT: "3"
    BACKUP_S3_BUCKET:      "<%= ENV.fetch('BACKUP_S3_BUCKET', '') %>"
    BACKUP_S3_PREFIX:      "<%= ENV.fetch('BACKUP_S3_PREFIX', 'btaa-geospatial-api') %>"
    BACKUP_S3_REGION:      "<%= ENV.fetch('BACKUP_S3_REGION', ENV.fetch('AWS_REGION', 'us-east-2')) %>"
    AWS_REGION:            "<%= ENV.fetch('AWS_REGION', ENV.fetch('BACKUP_S3_REGION', 'us-east-2')) %>"
    AWS_DEFAULT_REGION:    "<%= ENV.fetch('AWS_DEFAULT_REGION', ENV.fetch('AWS_REGION', ENV.fetch('BACKUP_S3_REGION', 'us-east-2'))) %>"
    ELASTICSEARCH_SNAPSHOT_REPOSITORY: "btaa_geoportal_snapshots"
    ELASTICSEARCH_SNAPSHOT_REPOSITORY_TYPE: "fs"
    ELASTICSEARCH_SNAPSHOT_S3_CLIENT: "default"

  secret:
    - REDIS_PASSWORD
    - POSTGRES_PASSWORD
    - DATABASE_URL
    - KITHE_BRIDGE_TOKEN
    - OPENAI_API_KEY
    - OPENAI_MODEL
    - ADMIN_USERNAME
    - ADMIN_PASSWORD
    - BTAA_GEOSPATIAL_API_KEY
    - TURNSTILE_SECRET_KEY
    - APPSIGNAL_PUSH_API_KEY
<% if ENV.fetch('SMTP_USERNAME', '').strip != '' %>
    - SMTP_USERNAME
<% end %>
<% if ENV.fetch('SMTP_PASSWORD', '').strip != '' %>
    - SMTP_PASSWORD
<% end %>

# ────────────── Accessories (one per Compose service) ──────────────
accessories:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    roles: [web, worker]
    env:
      clear:
        discovery.type: single-node
        xpack.security.enabled: "false"
        ES_JAVA_OPTS: "-Xms2g -Xmx2g"
        cluster.routing.allocation.disk.threshold_enabled: "true"
        cluster.routing.allocation.disk.watermark.low: "85%"
        cluster.routing.allocation.disk.watermark.high: "90%"
        cluster.routing.allocation.disk.watermark.flood_stage: "95%"
        path.repo: /usr/share/elasticsearch/backups
    # Optional: expose on host loopback for debugging from the VM
    port: "127.0.0.1:9200:9200"
    directories:
      - /var/lib/btaa-geospatial-api/elasticsearch:/usr/share/elasticsearch/data
      - /var/lib/btaa-geospatial-api/elasticsearch-backups:/usr/share/elasticsearch/backups

  paradedb:
    image: paradedb/paradedb:0.18.11
    roles: [web, worker]
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB:   btaa_geospatial_api
      secret:
        - POSTGRES_PASSWORD
    port: "127.0.0.1:5432:5432"
    directories:
      - /var/lib/btaa-geospatial-api/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7.4.6-alpine
    roles: [web, worker]
    env:
      clear:
        REDIS_MAXMEMORY: "<%= ENV.fetch('REDIS_MAXMEMORY', '12gb') %>"
        REDIS_MAXMEMORY_POLICY: "<%= ENV.fetch('REDIS_MAXMEMORY_POLICY', 'volatile-lru') %>"
      secret:
        - REDIS_PASSWORD
    cmd: sh -lc 'redis-server --appendonly yes --protected-mode yes --bind 0.0.0.0 --requirepass "$REDIS_PASSWORD" --maxmemory "$REDIS_MAXMEMORY" --maxmemory-policy "$REDIS_MAXMEMORY_POLICY"'
    directories:
      - /var/lib/btaa-geospatial-api/redis:/data

volumes: []
