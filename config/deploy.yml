# Name of your application. Used to uniquely configure containers.
service: btaa-geospatial-api

# Name of the container image (WITHOUT registry host; Kamal adds registry.server).
image: ewlarson/btaa-geospatial-api

builder:
  arch: amd64
  dockerfile: Dockerfile.kamal
  args:
    # Browser bundle should call the API on the same host (single-host routing)
    VITE_API_BASE_URL: "https://<%= ENV['KAMAL_HOST'] %>/api/v1"
    VITE_USE_JSONP: "false"
    VITE_ENFORCE_HTTPS: "true"

ssh:
  user: <%= ENV['KAMAL_SSH_USER'] %>

# Deploy to these servers.
servers:
  web:
    hosts:
      - <%= ENV['KAMAL_HOST'] %>
    cmd: bash -lc "/app/scripts/start_web_singlehost.sh"

  worker:
    hosts:
      - <%= ENV['KAMAL_HOST'] %>
    cmd: celery -A app.tasks.worker worker --loglevel=INFO

  flower:
    hosts:
      - <%= ENV['KAMAL_HOST'] %>
    cmd: celery -A app.tasks.worker flower --port=5555

proxy:
  ssl: true
  host: <%= ENV['KAMAL_HOST'] %>
  app_port: 8000
  healthcheck:
    path: /api/docs

# Credentials for your image host.
registry:
  server: ghcr.io
  username: <%= ENV['KAMAL_REGISTRY_USERNAME'] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

# ───────────────── ENV passed into *every* container ────────────────
env:
  clear:
    ELASTICSEARCH_URL:     http://btaa-geospatial-api-elasticsearch:9200
    REDIS_HOST:            btaa-geospatial-api-redis
    REDIS_PORT:            "6379"
    REDIS_DB:              "0"
    RATE_LIMIT_REDIS_DB:   "2"
    ELASTICSEARCH_INDEX:   btaa_geospatial_api
    REDIS_TTL:             "604800"
    LOG_LEVEL:             DEBUG
    ENDPOINT_CACHE:        "true"
    CACHE_DEBUG_HEADERS:   "true"
    CACHE_LOG_EVENTS:      "false"
    CACHE_VERSION:         "2026-01-14-C"
    # Optional: bump this to force a new cache namespace without flushing Redis
    CACHE_APP_VERSION:     ""
    REDIS_TIMEOUT_SECONDS: "0.5"
    CACHE_LOCK_WAIT_SECONDS: "0.25"
    STALE_IF_ERROR_SECONDS: "300"
    MAX_STALE_EXTENSION_SECONDS: "3600"
    GAZETTEER_CACHE_TTL:   "3600"
    APP_MODE:              production
    APPLICATION_URL:       https://<%= ENV['KAMAL_HOST'] %>
    PYTHONUNBUFFERED:      "1"
    PYTHONPATH:            /app
    # IMPORTANT: tells db/config.py not to rewrite Docker hostnames to localhost:2345
    IS_DOCKER:             "true"
    CORS_ORIGINS:          "*"
    STATIC_MAPS_DIR:       /app/static/maps
    RATE_LIMIT_ENABLED:    "<%= ENV['RATE_LIMIT_ENABLED'] %>"

  secret:
    - REDIS_PASSWORD
    - POSTGRES_PASSWORD
    - DATABASE_URL
    - OPENAI_API_KEY
    - OPENAI_MODEL
    - ADMIN_USERNAME
    - ADMIN_PASSWORD
    - BTAA_GEOSPATIAL_API_KEY

# ────────────── Accessories (one per Compose service) ──────────────
accessories:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    roles: [web, worker, flower]
    env:
      clear:
        discovery.type: single-node
        xpack.security.enabled: "false"
        ES_JAVA_OPTS: "-Xms2g -Xmx2g"
        cluster.routing.allocation.disk.threshold_enabled: "true"
        cluster.routing.allocation.disk.watermark.low: "85%"
        cluster.routing.allocation.disk.watermark.high: "90%"
        cluster.routing.allocation.disk.watermark.flood_stage: "95%"
    # Optional: expose on host loopback for debugging from the VM
    port: "127.0.0.1:9200:9200"
    directories:
      - esdata:/usr/share/elasticsearch/data

  paradedb:
    image: paradedb/paradedb:0.18.11
    roles: [web, worker, flower]
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB:   btaa_geospatial_api
      secret:
        - POSTGRES_PASSWORD
    port: "127.0.0.1:5432:5432"
    directories:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7.4.6-alpine
    roles: [web, worker, flower]
    env:
      secret:
        - REDIS_PASSWORD
    cmd: sh -lc 'redis-server --appendonly yes --protected-mode yes --bind 0.0.0.0 --requirepass "$REDIS_PASSWORD"'
    directories:
      - redisdata:/data

volumes:
  - esdata
  - pgdata
  - redisdata
