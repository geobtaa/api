# Destination: dev2 — New dev server
# Merged with config/deploy.yml when using: kamal deploy -d dev2

servers:
  web:
    hosts:
      - lib-geoportal-dev-web-01.oit.umn.edu
    cmd: bash -lc "/app/scripts/start_web_singlehost.sh"
    options:
      cpus: 5
      memory: 3584m

  worker:
    hosts:
      - lib-geoportal-dev-web-01.oit.umn.edu
    cmd: celery -A app.tasks.worker worker --loglevel=INFO
    options:
      cpus: 0.75
      memory: 1536m

  cron:
    hosts:
      - lib-geoportal-dev-web-01.oit.umn.edu
    cmd: bash -lc '/opt/venv/bin/python3 /app/scripts/render_cron_env.py /tmp/cron-container-env.sh && (printf "ADMIN_USERNAME=%s\nADMIN_PASSWORD=%s\nAPPLICATION_URL=%s\nBRIDGE_TRIGGER=%s\n" "${ADMIN_USERNAME}" "${ADMIN_PASSWORD}" "${APPLICATION_URL}" "${BRIDGE_TRIGGER:-nightly_cron}"; cat config/crontab) | crontab - && cron -f'
    options:
      user: root

  flower:
    hosts:
      - lib-geoportal-dev-web-01.oit.umn.edu
    cmd: celery -A app.tasks.worker flower --port=5555

proxy:
  host: geodev.btaa.org,lib-geoportal-dev-web-01.oit.umn.edu

builder:
  args:
    VITE_API_BASE_URL: "https://geodev.btaa.org/api/v1"
    VITE_TURNSTILE_ACTION: "geoportal_gate"
    VITE_TURNSTILE_ENABLED: "true"
    VITE_TURNSTILE_SITE_KEY: "0x4AAAAAADJqCBiv8czDm2ZG"
    VITE_KAMAL_DEST: "dev2"

env:
  clear:
    APPLICATION_URL: https://geodev.btaa.org
    KAMAL_DEST: dev2
    TURNSTILE_ENABLED: "true"
    TURNSTILE_ALLOWED_HOSTNAMES: geodev.btaa.org,lib-geoportal-dev-web-01.oit.umn.edu
    TURNSTILE_COOKIE_SECURE: "true"
    TURNSTILE_EXPECTED_ACTION: geoportal_gate
    RATE_LIMIT_ENABLED: "true"
    API_KEY_TIER_CACHE_TTL_SECONDS: "60"
    API_KEY_LAST_USED_UPDATE_INTERVAL_SECONDS: "60"
    API_KEY_TIER_CACHE_MAX_ENTRIES: "2048"
    DB_POOL_MAX: "3"
    SQLALCHEMY_ASYNC_USE_NULLPOOL: "false"
    SQLALCHEMY_ASYNC_POOL_SIZE: "2"
    SQLALCHEMY_ASYNC_MAX_OVERFLOW: "1"
    SQLALCHEMY_ASYNC_POOL_TIMEOUT: "5"
    WEB_UVICORN_WORKERS: "3"
    WEB_INTERNAL_UVICORN_WORKERS: "4"
    WEB_SSR_WORKERS: "3"

accessories:
  elasticsearch:
    env:
      clear:
        ES_JAVA_OPTS: "-Xms4g -Xmx4g"
