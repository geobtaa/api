services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ewlarson/btaa-geospatial-api:0.2.0
    container_name: btaa-geospatial-api-app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@paradedb:5432/btaa_geospatial_api
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=btaa_geospatial_api
      - LOG_PATH=/app/logs
      - APPLICATION_URL=http://localhost:8000
      - CORS_ORIGINS=*
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TTL=604800
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - LOG_LEVEL=DEBUG
      - ENDPOINT_CACHE=true
      - GAZETTEER_CACHE_TTL=3600
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme
      - IS_DOCKER=true
    ports:
      - "127.0.0.1:8000:8000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      elasticsearch:
        condition: service_healthy
      paradedb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - .:/app
    networks: [elastic]
    command: ["uvicorn","main:app","--host","0.0.0.0","--port","8000","--log-level","debug"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: btaa-geospatial-api-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=85%
      - cluster.routing.allocation.disk.watermark.high=90%
      - cluster.routing.allocation.disk.watermark.flood_stage=95%
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: 4g
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    networks: [elastic]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  paradedb:
    image: paradedb/paradedb:0.18.11
    container_name: btaa-geospatial-api-paradedb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=btaa_geospatial_api
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:2345:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks: [elastic]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d btaa_geospatial_api"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.6-alpine
    container_name: btaa-geospatial-api-redis
    command: >
      redis-server
      --appendonly yes
      --protected-mode yes
      --bind 0.0.0.0
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks: [elastic]
    healthcheck:
      test: ["CMD","sh","-lc","redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: btaa-geospatial-api-celery
    # pass broker/backend explicitly in case your app doesn't read envs:
    command: celery -A app.tasks.worker worker --loglevel=INFO
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@paradedb:5432/btaa_geospatial_api
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - REDIS_TTL=604800
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
    volumes:
      - ./logs:/app/logs
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      paradedb:
        condition: service_healthy
    networks: [elastic]

  flower:
    build:
      context: .
    container_name: btaa-geospatial-api-flower
    # tell Flower where the broker is
    command: bash -lc "cd /app && celery -A app.tasks.worker flower --port=5555 --broker=redis://:${REDIS_PASSWORD}@redis:6379/0"
    ports:
      - "127.0.0.1:5555:5555"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@paradedb:5432/btaa_geospatial_api
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - PYTHONPATH=/app
      - LOG_LEVEL=DEBUG
    networks: [elastic]
    depends_on:
      redis:
        condition: service_healthy
      paradedb:
        condition: service_healthy
      celery_worker:
        condition: service_started

volumes:
  elasticsearch-data:
  paradedb-data:
  redis-data:

networks:
  elastic:
    driver: bridge
