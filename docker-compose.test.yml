services:
  paradedb_test:
    image: paradedb/paradedb:latest
    container_name: btaa-ogm-api-paradedb-test
    env_file:
      - .env.test
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=btaa_ogm_api_test
    ports:
      - "2346:5432"  # Different port from dev database
    volumes:
      - ./data/postgres_test:/var/lib/postgresql/data
    networks:
      - test_network

  elasticsearch_test:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: btaa-ogm-api-elasticsearch-test
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"  # Different port from dev elasticsearch
    volumes:
      - ./data/elasticsearch_test:/usr/share/elasticsearch/data
    networks:
      - test_network

  redis_test:
    image: redis:7-alpine
    container_name: btaa-ogm-api-redis-test
    ports:
      - "6380:6379"  # Different port from dev redis
    networks:
      - test_network

networks:
  test_network:
    driver: bridge 