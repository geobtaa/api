[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
# Coverage is optional - use --cov flag to enable
# addopts = --cov=app --cov-report=term-missing --cov-report=html --cov-report=xml
# Show slowest 10 tests by default
addopts = --durations=10
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Test markers for categorization
markers =
    unit: Fast unit tests that don't require external services
    integration: Integration tests that require database/elasticsearch/redis
    slow: Tests that take a long time to run (>1 second)
    elasticsearch: Tests that require Elasticsearch
    database: Tests that require database connections
    redis: Tests that require Redis
    network: Tests that fetch from external URLs (pmtiles.io, etc.)